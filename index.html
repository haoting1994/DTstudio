<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>攝影棚場景管理系統</title>
<style>
  :root {
    --bg: #2a2a2a; --bg2: #222; --bg3: #333;
    --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    --accent: #e8720c; --accent2: #c45e08;
    --blue: #3a8fd4; --red: #d04040;
    --radius: 10px; --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: #eee; min-height: 100vh; }
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 220px; min-width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .main { flex: 1; overflow-y: auto; background: var(--bg); }

  .sidebar-header { padding: 16px 16px 10px; border-bottom: 1px solid var(--border); }
  .sidebar-header h1 { font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; }
  .sync-status { font-size: 10px; margin-top: 5px; color: #888; display: flex; align-items: center; gap: 5px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; }
  .sync-dot.online { background: #4caf50; }
  .sync-dot.saving { background: var(--accent); animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .sidebar-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 14px; cursor: pointer; font-size: 12px; color: #aaa; border-left: 2px solid transparent; transition: 0.1s; }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: #ddd; }
  .nav-item.active { background: rgba(232,114,12,0.18); color: var(--accent); border-left-color: var(--accent); }
  .nav-item .dot { width: 6px; height: 6px; border-radius: 50%; background: #555; }
  .nav-item.active .dot { background: var(--accent); }

  .main-header { padding: 24px 28px 0; display: flex; justify-content: space-between; }
  .editable-title { background: none; border: none; font-size: 22px; font-weight: 600; color: #eee; outline: none; width: 100%; }
  .section-tabs { display: flex; gap: 4px; padding: 16px 28px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .stab { padding: 8px 18px; font-size: 13px; color: #666; cursor: pointer; transition: 0.15s; }
  .stab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

  .panel { padding: 24px 28px; }
  .overlay-zone { position: relative; border-radius: var(--radius); overflow: hidden; background: #3a3a3a; min-height: 300px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); cursor: pointer; }
  .light-tag { position: absolute; background: rgba(0,0,0,0.8); border: 1px solid var(--accent); border-radius: 20px; padding: 4px 10px; display: flex; align-items: center; gap: 6px; cursor: move; }
  .tag-val { font-size: 11px; font-weight: 600; color: var(--accent); }

  .lights-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin-top: 16px; }
  .light-card { background: #3c3c3c; border-radius: var(--radius-sm); padding: 12px 14px; border: 1px solid var(--border); }
  .lf input { background: #2a2a2a; border: 1px solid var(--border); border-radius: 4px; padding: 5px; color: #eee; width: 100%; outline: none; }

  .loading-overlay { position: fixed; inset: 0; background: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
  .loading-overlay.hidden { display: none; }
  .spinner { width: 30px; height: 30px; border: 3px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .sidebar { display: none; }
    .main { padding-bottom: 100px; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p style="margin-top:10px; font-size:12px; color:#888;">連線至彰化資料中心 (asia-east1)...</p>
</div>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>DT STUDIO</h1>
      <div class="sync-status">
        <span class="sync-dot" id="syncDot"></span>
        <span id="syncText">連線中...</span>
      </div>
    </div>
    <div class="sidebar-list" id="navList"></div>
    <div style="padding:12px;"><button onclick="addProgram()" style="width:100%; padding:8px; background:none; border:1px dashed #555; color:#777; cursor:pointer;">+ 新增節目</button></div>
  </div>
  <div class="main" id="mainArea"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, collection, onSnapshot, setDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAA_lBeMcU_MHwBIakycWMY1qVFQpNFlLw",
  authDomain: "dt-studio-5bb2b.firebaseapp.com",
  projectId: "dt-studio-5bb2b",
  storageBucket: "dt-studio-5bb2b.firebasestorage.app",
  messagingSenderId: "453498810482",
  appId: "1:453498810482:web:265ae1a1aac433355e52eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const COL = 'programs';

// ── 狀態管理 ──
window.programs = [];
window.activeId = null;
window.activeTab = 'scene';
let dragging = null, dragOffX = 0, dragOffY = 0;

// ── 實時監聽 ──
onSnapshot(collection(db, COL), (snap) => {
  const data = [];
  snap.forEach(d => data.push(d.data()));
  data.sort((a, b) => (a.order || 0) - (b.order || 0));
  window.programs = data;
  if (!window.activeId && data.length > 0) window.activeId = data[0].id;
  document.getElementById('loadingOverlay').classList.add('hidden');
  updateStatus('online', '已同步');
  render();
});

// ── 雲端儲存函式 ──
async function saveToCloud(p) {
  updateStatus('saving', '同步中...');
  await setDoc(doc(db, COL, String(p.id)), p);
}

// ── 渲染主畫面 ──
window.render = function() {
  const list = document.getElementById('navList');
  list.innerHTML = window.programs.map(p => `
    <div class="nav-item ${p.id === window.activeId ? 'active' : ''}" onclick="window.activeId=${p.id};render()">
      <span class="dot"></span>
      <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${p.name}</span>
    </div>
  `).join('');

  const area = document.getElementById('mainArea');
  const p = window.programs.find(x => x.id === window.activeId);
  if (!p) return;

  area.innerHTML = `
    <div class="main-header">
      <input class="editable-title" value="${p.name}" onblur="updateP(${p.id}, {name:this.value})">
      <button onclick="deleteP(${p.id})" style="color:#d04040; background:none; border:none; cursor:pointer; font-size:12px;">刪除節目</button>
    </div>
    <div class="section-tabs">
      <div class="stab ${window.activeTab==='scene'?'active':''}" onclick="window.activeTab='scene';render()">場景圖</div>
      <div class="stab ${window.activeTab==='light'?'active':''}" onclick="window.activeTab='light';render()">詳細參數</div>
    </div>
    <div class="panel">
      ${window.activeTab === 'scene' ? renderScenePanel(p) : renderLightPanel(p)}
    </div>
  `;
};

function renderScenePanel(p) {
  return `
    <div class="overlay-zone" id="zone-${p.id}" onclick="triggerUpload(${p.id})">
      ${p.sceneImg ? `<img src="${p.sceneImg}" style="width:100%" draggable="false">` : '<p>點擊上傳場景圖</p>'}
      ${(p.lights || []).map((l, i) => {
        const pos = (p.sceneTagPos || {})[i] || {left:'10px', top:'10px'};
        return `<div class="light-tag" id="tag-${p.id}-${i}" style="left:${pos.left}; top:${pos.top}" onmousedown="startDrag(event,${p.id},${i})">
          <span style="font-size:10px; color:#aaa;">${l.name}</span>
          <span class="tag-val">${l.intensity || '--'}</span>
        </div>`;
      }).join('')}
    </div>
    <input type="file" id="file-${p.id}" style="display:none" onchange="uploadImg(event, ${p.id})">
  `;
}

function renderLightPanel(p) {
  return `
    <div class="lights-grid">
      ${(p.lights || []).map((l, i) => `
        <div class="light-card">
          <div style="font-size:12px; margin-bottom:8px;">${l.name}</div>
          <div class="lf"><label>亮度</label><input value="${l.intensity}" oninput="updateLight(${p.id},${i},'intensity',this.value)"></div>
          <div class="lf" style="margin-top:5px;"><label>色溫</label><input value="${l.kelvin}" oninput="updateLight(${p.id},${i},'kelvin',this.value)"></div>
        </div>
      `).join('')}
      <button onclick="addLight(${p.id})" style="border:1px dashed #555; background:none; color:#777; border-radius:4px; padding:10px; cursor:pointer;">+ 新增燈光</button>
    </div>
  `;
}

// ── 互動功能 ──
window.updateP = function(id, data) {
  const p = window.programs.find(x => x.id === id);
  Object.assign(p, data);
  saveToCloud(p);
}

window.updateLight = function(pid, idx, field, val) {
  const p = window.programs.find(x => x.id === pid);
  p.lights[idx][field] = val;
  saveToCloud(p);
}

window.addLight = function(pid) {
  const p = window.programs.find(x => x.id === pid);
  if(!p.lights) p.lights = [];
  p.lights.push({name:'燈光'+(p.lights.length+1), intensity:'', kelvin:''});
  saveToCloud(p);
}

window.triggerUpload = function(id) { document.getElementById('file-'+id).click(); }

window.uploadImg = function(e, id) {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = () => {
    updateP(id, {sceneImg: reader.result});
  };
  reader.readAsDataURL(file);
}

window.addProgram = async function() {
  const name = prompt("節目名稱:");
  if(!name) return;
  const newP = { id: Date.now(), name, order: window.programs.length, lights: [], sceneTagPos: {} };
  await saveToCloud(newP);
}

window.deleteP = async function(id) {
  if(confirm("確定刪除？")) await deleteDoc(doc(db, COL, String(id)));
}

// ── 拖拉功能 ──
window.startDrag = function(e, pid, idx) {
  dragging = { pid, idx };
  const rect = document.getElementById(`tag-${pid}-${idx}`).getBoundingClientRect();
  dragOffX = e.clientX - rect.left;
  dragOffY = e.clientY - rect.top;
}

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const zone = document.getElementById(`zone-${dragging.pid}`);
  const zr = zone.getBoundingClientRect();
  const tag = document.getElementById(`tag-${dragging.pid}-${dragging.idx}`);
  
  let l = e.clientX - zr.left - dragOffX;
  let t = e.clientY - zr.top - dragOffY;
  
  tag.style.left = l + 'px';
  tag.style.top = t + 'px';
});

document.addEventListener('mouseup', () => {
  if (dragging) {
    const p = window.programs.find(x => x.id === dragging.pid);
    const tag = document.getElementById(`tag-${dragging.pid}-${dragging.idx}`);
    if(!p.sceneTagPos) p.sceneTagPos = {};
    p.sceneTagPos[dragging.idx] = { left: tag.style.left, top: tag.style.top };
    saveToCloud(p);
    dragging = null;
  }
});

function updateStatus(state, text) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if(dot) dot.className = 'sync-dot ' + state;
  if(txt) txt.textContent = text;
}
</script>
</body>
</html>
